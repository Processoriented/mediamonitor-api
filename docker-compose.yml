services:
  mediamonitor-api:
    build: .
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      HOST: "${HOST:-::}"
      PORT: "8787"
      DATA_DIR: "/data"
      SQLITE_FILE: "${SQLITE_FILE:-mediamonitor.sqlite}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-30}"
      SEERR_BASE_URL: "${SEERR_BASE_URL-}"
      SEERR_API_KEY: "${SEERR_API_KEY-}"
      SONARR_BASE_URL: "${SONARR_BASE_URL-}"
      SONARR_API_KEY: "${SONARR_API_KEY-}"
      RADARR_BASE_URL: "${RADARR_BASE_URL-}"
      RADARR_API_KEY: "${RADARR_API_KEY-}"
      SABNZBD_BASE_URL: "${SABNZBD_BASE_URL-}"
      SABNZBD_API_KEY: "${SABNZBD_API_KEY-}"
      TAUTULLI_BASE_URL: "${TAUTULLI_BASE_URL-}"
      TAUTULLI_API_KEY: "${TAUTULLI_API_KEY-}"
      SABNZBD_PULL_LOG_INGEST_PATH: "${SABNZBD_PULL_LOG_INGEST_PATH-/host/logs/sabnzbd_pull.log}"
      SABNZBD_PULL_STATE_INGEST_PATH: "${SABNZBD_PULL_STATE_INGEST_PATH-/host/state/sabnzbd_pull_state.json}"
      PLEX_MEDIA_SCANNER_LOG_INGEST_PATH: "${PLEX_MEDIA_SCANNER_LOG_INGEST_PATH-/host/plex-logs}"
    volumes:
      - mediamonitor_data:/data

volumes:
  mediamonitor_data:

